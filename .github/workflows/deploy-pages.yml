name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website source
        uses: actions/checkout@v6
      - name: Validate, build, and upload static website
        uses: withastro/action@v6
        with:
          node-version: 24
          package-manager: pnpm@11.13.0
          build-cmd: pnpm run check && pnpm test && pnpm run build && pnpm run check:site
          out-dir: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
