name: Refresh download statistics

on:
  schedule:
    # GitHub cron cannot express an exact interval across month boundaries.
    # Run a lightweight daily check and write a snapshot only when five full days have elapsed.
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Refresh now even if five days have not elapsed
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: download-statistics
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website source
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: Collect public release download counts
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            node scripts/update-download-stats.mjs --force --if-due-days 5
          else
            node scripts/update-download-stats.mjs --if-due-days 5
          fi
      - name: Validate statistics snapshot
        run: node scripts/validate-download-stats.mjs
      - name: Commit a due snapshot
        run: |
          if git diff --quiet -- src/data/download-stats.json; then
            echo "No statistics update was due."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/download-stats.json
          git commit -m "chore: refresh download statistics"
          git push
